version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: waygood-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: waygood-evaluation

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: waygood-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/waygood-evaluation
      JWT_SECRET: change-this-to-a-long-random-secret-in-production
      JWT_EXPIRES_IN: 1d
      CACHE_TTL_SECONDS: 300
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: waygood-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongo_data:
